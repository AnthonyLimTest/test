name: Run Unit Tests

on:
  push:
    branches:
    - 'main'
  pull_request:
    branches:
      - 'main'
  merge_group:
    types: [checks_requested]
  release:

jobs:
  run_tests:
    strategy:
      matrix:
           os: [ubuntu-latest]
           python_version: ['3.10']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Needed to get tags so that git describe works during package build
          fetch-depth: "0"

      - name: compile
        shell: bash -l {0}
        run:  |
            python -m pip install .
            python -V

      - name: run tests
        timeout-minutes: 10
        shell: bash -l {0}
        run:  |
             python -m pytest
